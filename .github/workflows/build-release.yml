name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            exe_name: FFmpegCropTool.exe
            portable: true

          - os: macos-13
            name: macos-x64
            exe_name: FFmpegCropTool

          - os: macos-latest        # macos-14, Apple Silicon
            name: macos-arm64
            exe_name: FFmpegCropTool

          - os: ubuntu-22.04
            name: linux-x64
            exe_name: FFmpegCropTool

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyinstaller flask

      # ---- Build ----------------------------------------------------------------

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: >
          pyinstaller
          --onefile
          --name FFmpegCropTool
          --hidden-import=flask
          --hidden-import=werkzeug
          --hidden-import=jinja2
          --hidden-import=click
          --collect-all flask
          launcher.py

      - name: Build (macOS / Linux)
        if: runner.os != 'Windows'
        run: >
          pyinstaller
          --onefile
          --name FFmpegCropTool
          --hidden-import=flask
          --hidden-import=werkzeug
          --hidden-import=jinja2
          --hidden-import=click
          --collect-all flask
          launcher.py

      # ---- Package: Windows standard -------------------------------------------

      - name: Package Windows (standard installer zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\pkg-standard -Force
          Copy-Item dist\FFmpegCropTool.exe dist\pkg-standard\
          Copy-Item scripts\install-context-menu.ps1  dist\pkg-standard\ -ErrorAction SilentlyContinue
          Copy-Item scripts\uninstall-context-menu.ps1 dist\pkg-standard\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\pkg-standard\* `
            -DestinationPath dist\FFmpegCropTool-${{ matrix.name }}.zip

      # ---- Package: Windows portable (bundles ffmpeg) --------------------------

      - name: Download ffmpeg for Windows portable
        if: matrix.portable
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/ffmpeg-builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Write-Host "Downloading ffmpeg from $url"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg-win.zip -TimeoutSec 300
          Expand-Archive ffmpeg-win.zip -DestinationPath ffmpeg-tmp
          $binDir = (Get-ChildItem ffmpeg-tmp -Directory | Select-Object -First 1).FullName + "\bin"
          New-Item -ItemType Directory -Path dist\pkg-portable -Force
          Copy-Item dist\FFmpegCropTool.exe dist\pkg-portable\
          Copy-Item "$binDir\ffmpeg.exe"   dist\pkg-portable\
          Copy-Item "$binDir\ffprobe.exe"  dist\pkg-portable\
          Copy-Item "$binDir\ffplay.exe"   dist\pkg-portable\
          Copy-Item scripts\install-context-menu.ps1  dist\pkg-portable\ -ErrorAction SilentlyContinue
          Copy-Item scripts\uninstall-context-menu.ps1 dist\pkg-portable\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\pkg-portable\* `
            -DestinationPath dist\FFmpegCropTool-windows-portable.zip

      # ---- Package: macOS (.app bundle) ----------------------------------------

      - name: Create macOS .app bundle
        if: runner.os == 'macOS'
        run: |
          APP="dist/FFmpegCropTool.app"
          mkdir -p "$APP/Contents/MacOS"
          cp dist/FFmpegCropTool "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/FFmpegCropTool"

          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>FFmpegCropTool</string>
            <key>CFBundleIdentifier</key><string>com.ffmpeg-crop-tool.app</string>
            <key>CFBundleName</key><string>FFmpeg Crop Tool</string>
            <key>CFBundleDisplayName</key><string>FFmpeg Crop Tool</string>
            <key>CFBundleVersion</key><string>${{ github.ref_name }}</string>
            <key>CFBundleShortVersionString</key><string>${{ github.ref_name }}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>12.0</string>
            <key>CFBundleDocumentTypes</key>
            <array>
              <dict>
                <key>CFBundleTypeName</key><string>Video</string>
                <key>CFBundleTypeRole</key><string>Viewer</string>
                <key>LSHandlerRank</key><string>Alternate</string>
                <key>LSItemContentTypes</key>
                <array>
                  <string>public.movie</string>
                  <string>public.mpeg-4</string>
                  <string>public.avi</string>
                  <string>org.webmproject.webm</string>
                  <string>com.apple.quicktime-movie</string>
                </array>
              </dict>
            </array>
          </dict>
          </plist>
          PLIST

          ditto -c -k --sequesterRsrc --keepParent "$APP" \
            "dist/FFmpegCropTool-${{ matrix.name }}.zip"

      # ---- Package: Linux ------------------------------------------------------

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          chmod +x dist/FFmpegCropTool
          mkdir -p dist/pkg-linux
          cp dist/FFmpegCropTool dist/pkg-linux/
          cp scripts/install-context-menu-linux.sh dist/pkg-linux/ 2>/dev/null || true
          tar -czf dist/FFmpegCropTool-${{ matrix.name }}.tar.gz \
            -C dist/pkg-linux .

      # ---- Upload artifacts ----------------------------------------------------

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.name }}
          path: |
            dist/FFmpegCropTool-*.zip
            dist/FFmpegCropTool-*.tar.gz

  # ---------------------------------------------------------------------------
  # Create the GitHub release with all platform artifacts
  # ---------------------------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          draft: false
          fail_on_unmatched_files: false
